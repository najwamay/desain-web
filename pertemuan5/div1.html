<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<style>
		* {
			margin: 0;
			color: #fff;
			text-align: center;
		}

		.container {
			max-width: 1200px;
			margin: auto;
			background: #ddd;
		}

		.header {
			height: 150px;
			background: #333;
		}

		.nav {
			height: 50px;
			background: #000;
		}

		.main {
			background: #ccc;
		}

		.aside {
			width: 25%;
			height: 200px;
			float: left;
			background: #333;
		}

		.section {
			width: 75%;
			height: 200px;
			float: left;
			background: #ccc;
		}

		.clear {
			clear: both;
		}

		.footer {
			height: 80px;
			background: #000;
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="header">Ini Header</div>
		<div class="nav">Ini Navigasi</div>
		<div class="main">
			<div class="aside">Ini Sidebar</div>
			<div class="selection">Ini Selection</div>
			<div class="clear"></div>
		</div>
		<div class="footer">Ini Footer</div>
	</div>

</body>

</html>
