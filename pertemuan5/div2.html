<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<style>
		.form {
			background-color: gray;
			-moz-border-radius: 10px;
			border-radius: 10px;
			padding: 20px;
			width: 400px;
			text-align: right;
		}

		.formElement {
			width: 300px;
		}

		.label {
			display: inline-block;
			vertical-align: top;
		}

		.tombol {
			border: #333;
			border-style: solid;
			border-width: 2px;
			border-radius: 10px;
			background: #ccc;
			padding: 0.5rem;
		}

		.submit {
			display: inline-block;
		}

		.reset {
			display: inline-block;
		}
	</style>
</head>

<body>
	<div class="form">
		<div>
			<label>Name:</label>
			<input type="text" name="name" class="formElements">
			<p>
				<label>Email:</label>
				<input type="email" name="email" class="formElements">
			</p>
			<p>
				<label>Message:</label>
				<textarea name="message" class="formElements" rows="4"></textarea>
			</p>
			<div class="tombol">
				<input type="submit" class="submit" value="Kirim" />
				<input type="reset" class="reset" value="Reset" />
			</div>
		</div>
	</div>

</body>

</html>
