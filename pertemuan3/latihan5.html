<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pendaftaran Anggota Perpustakaan</title>
	<style>
		body{
			background-color:yellowgreen ;
		}
	</style>
</head>
<body>
	<h1>Sistem Informasi Pendaftaran Anggota Perpustakaan Online</h1>
	<form>
		<table>
			<tr>
				<td>
					<label>No Identitas</label>
				</td>
				<td>
					<input type="text" name="nik">
				</td>
			</tr>

			<tr>
				<td>
					<label>Fakultas</label>
				</td>
				<td>
					<select>
						<option>Ekonomi dan Bisnis</option>
						<option>Hukum</option>
						<option>Ilmu Budaya</option>
						<option>Ilmu Sosial dan Politik</option>
						<option>Kedokteran</option>
						<option>Keguruan dan Ilmu Pendidikan</option>
						<option>Keolahragaan</option>
						<option>Matematika dan IPA</option>
						<option>Pertanian</option>
						<option>Psikologi</option>
						<option>Seni Rupa dan Desain</option>
						<option>Teknik</option>
						<option>Teknologi Informasi dan Sains Data</option>
					</select>
				</td>
			</tr>

			<tr>
				<td>
					<label>Nama Anggota</label>
				</td>
				<td>
					<input type="text" name="nama">
				</td>
			</tr>

			<tr>
				<td>
					<label>Tipe Anggota</label>
				</td>
				<td>
					<select>
						<option>Reguler</option>
						<option>Premium</option>
					</select>
				</td>					
			</tr>

			<tr>
				<td>
					<label>Jenis Kelamin</label>
				</td>
				<td>
					<select>
						<option>Laki-laki</option>
						<option>Perempuan</option>
					</select>
				</td>					
			</tr>

			<tr>
				<td>
					<label>Tanggal Lahir</label>
				</td>
				<td>
					<input type="date" name="tanggal">
				</td>
			</tr>

			<tr>
				<td>
					<label>Alamat Lengkap</label>
				</td>
				<td>
					<input type="text" name="alamat">
				</td>
			</tr>

			<tr>
				<td>
					<label>Kode Pos</label>
				</td>
				<td>
					<input type="text" name="kode">
				</td>
			</tr>

			<tr>
				<td>
					<label>No HP</label>
				</td>
				<td>
					<input type="text" name="hp">
				</td>
			</tr>

			<tr>
				<td>
					<label>Alamat Email</label>
				</td>
				<td>
					<input type="text" name="email">
				</td>
			</tr>

			<tr>
				<td>
					<label>Password</label>
				</td>
				<td>
					<input type="text" name="sandi">
				</td>
			</tr>

			<tr>
				<td>
					<label>Ulangi Password</label>
				</td>
				<td>
					<input type="text" name="ulang sandi">
				</td>
			</tr>

			<tr>
				<td>
					<input type="submit" name="Simpan">
					<input type="reset" value="Keluar">
				</td>
			</tr>
		</table>
	</form>
</body>
</html>
